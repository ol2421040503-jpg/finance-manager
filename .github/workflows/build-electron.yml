name: Build Electron App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            ext: .exe
            artifact: win-installer
          - os: macos-latest
            platform: mac
            ext: .dmg
            artifact: mac-installer
          - os: ubuntu-latest
            platform: linux
            ext: .AppImage
            artifact: linux-installer

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js static export
        run: ELECTRON_BUILD=1 pnpm next build

      - name: Compile Electron main process
        run: pnpm electron:compile

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Build Electron (Windows)
        if: matrix.platform == 'win'
        run: pnpm electron-builder --win --config electron-builder.yml

      - name: Build Electron (macOS)
        if: matrix.platform == 'mac'
        run: pnpm electron-builder --mac --config electron-builder.yml

      - name: Build Electron (Linux)
        if: matrix.platform == 'linux'
        run: pnpm electron-builder --linux --config electron-builder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.deb
          if-no-files-found: warn
