name: Build Electron App
on:
  push:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js static export
        run: ELECTRON_BUILD=1 pnpm next build

      - name: Compile Electron main process
        run: pnpm electron:compile

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Build Electron (Linux)
        run: pnpm electron-builder --linux --config electron-builder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
          if-no-files-found: warn

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js static export
        run: ELECTRON_BUILD=1 pnpm next build

      - name: Compile Electron main process
        run: pnpm electron:compile

      - name: Build Electron (Windows)
        run: pnpm electron-builder --win --config electron-builder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist-electron/*.exe
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js static export
        run: ELECTRON_BUILD=1 pnpm next build

      - name: Compile Electron main process
        run: pnpm electron:compile

      - name: Build Electron (macOS)
        run: pnpm electron-builder --mac --config electron-builder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-electron/*.dmg
          if-no-files-found: warn
